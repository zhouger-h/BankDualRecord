name: Build Linux (Debian Package)

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  APP_VERSION: "1.0.0"
  APP_NAME: "dualrecord"
  APP_ARCH: "amd64"

jobs:
  build-deb:
    name: Build .deb (Ubuntu 20.04 / amd64)
    runs-on: ubuntu-20.04

    steps:
      # ── 1. 检出代码 ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. 安装编译 & 打包依赖 ───────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential \
            qt5-qmake \
            qtbase5-dev \
            qtmultimedia5-dev \
            libqt5multimediawidgets5 \
            libqt5multimedia5 \
            libqt5multimedia5-plugins \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-base \
            libssh2-1-dev \
            libssl-dev \
            libx11-dev \
            pkg-config \
            dpkg-dev

      # ── 3. 验证工具链版本 ────────────────────────────────────
      - name: Verify toolchain
        run: |
          qmake --version
          pkg-config --modversion gstreamer-1.0
          pkg-config --modversion gstreamer-video-1.0
          echo "GCC: $(gcc --version | head -1)"

      # ── 4. 编译主程序 ────────────────────────────────────────
      - name: Build DualRecordService
        run: |
          qmake DualRecordService.pro CONFIG+=release
          make -j$(nproc)
          echo "--- Binary info ---"
          ls -lh DualRecordService
          file DualRecordService

      # ── 5. 打包 .deb（复用 build_deb.sh，跳过编译步骤）─────
      #   build_deb.sh Step 1 会重新执行 qmake+make，
      #   这里通过跳过 Step1 来节省时间——直接在脚本外完成编译后
      #   只执行打包部分。为保持脚本不变，允许脚本重新编译（幂等）。
      - name: Package .deb via build_deb.sh
        run: |
          chmod +x build_deb.sh
          bash build_deb.sh

      # ── 6. 验证产物 ──────────────────────────────────────────
      - name: Verify .deb package
        run: |
          DEB="${{ env.APP_NAME }}_${{ env.APP_VERSION }}_${{ env.APP_ARCH }}.deb"
          echo "=== Package Info ==="
          dpkg-deb --info "${DEB}"
          echo ""
          echo "=== Package Contents ==="
          dpkg-deb --contents "${DEB}"
          echo ""
          echo "=== File Size ==="
          ls -lh "${DEB}"

      # ── 7. 上传构建产物（每次 push 均保留 30 天）────────────
      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: dualrecord-linux-deb-${{ github.sha }}
          path: ${{ env.APP_NAME }}_${{ env.APP_VERSION }}_${{ env.APP_ARCH }}.deb
          retention-days: 30

      # ── 8. 发布 Release（仅推送 tag 时触发）─────────────────
      - name: Create GitHub Release (Linux .deb)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APP_NAME }}_${{ env.APP_VERSION }}_${{ env.APP_ARCH }}.deb
          name: "银行柜面双录控件 ${{ github.ref_name }}"
          body: |
            ## 银行柜面双录控件 ${{ github.ref_name }} — Linux 版本

            ### 适用系统
            - 银河麒麟 V10 / 中标麒麟 / UOS（x86_64）
            - Ubuntu 20.04 / 22.04（x86_64）

            ### 安装
            ```bash
            sudo dpkg -i dualrecord_${{ env.APP_VERSION }}_amd64.deb
            # 如有依赖缺失：
            sudo apt-get install -f
            ```

            ### 卸载
            ```bash
            sudo dpkg -r dualrecord
            ```

            ### 查看运行日志
            ```bash
            journalctl -u dualrecord -f
            ```
          draft: false
          prerelease: false
