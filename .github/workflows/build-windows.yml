name: Build Windows (NSIS Installer)

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  APP_VERSION: "1.0.0"
  QT_VERSION: "5.15.2"
  # MinGW 32-bit host，与 build_windows.bat 一致
  QT_ARCH: "win32_mingw81"
  QT_HOST: "windows"
  QT_TARGET: "desktop"
  MINGW_DIR: "C:/Qt/Tools/mingw810_32/bin"
  QT_BIN_DIR: "C:/Qt/5.15.2/mingw81_32/bin"

jobs:
  build-windows:
    name: Build Windows x86 Installer
    runs-on: windows-2019

    steps:
      # ── 1. 检出代码 ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. 安装 Qt 5.15.2 MinGW 32-bit ──────────────────────
      - name: Install Qt 5.15.2 (MinGW 32-bit)
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          host: ${{ env.QT_HOST }}
          target: ${{ env.QT_TARGET }}
          arch: ${{ env.QT_ARCH }}
          # 安装 Qt + MinGW 工具链
          tools: "tools_mingw,qt.tools.win32_mingw810"
          cache: true
          cache-key-prefix: qt-win32-mingw81

      # ── 3. 将 MinGW 和 Qt bin 加入 PATH ─────────────────────
      - name: Configure PATH
        shell: pwsh
        run: |
          # jurplel/install-qt-action 会自动设置 Qt_DIR 和 PATH
          # 此步骤额外确认关键工具可用
          $qtBin = "${{ env.QT_BIN_DIR }}"
          $mingwBin = "${{ env.MINGW_DIR }}"
          echo "$qtBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "$mingwBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Write-Host "Qt bin: $qtBin"
          Write-Host "MinGW bin: $mingwBin"

      # ── 4. 验证工具链 ────────────────────────────────────────
      - name: Verify toolchain
        shell: cmd
        run: |
          qmake --version
          mingw32-make --version
          windeployqt --version

      # ── 5. 编译主程序 ────────────────────────────────────────
      - name: Build DualRecordService
        shell: cmd
        run: |
          if exist Makefile del /f Makefile
          if exist Makefile.Debug del /f Makefile.Debug
          if exist Makefile.Release del /f Makefile.Release
          if exist out\build rmdir /s /q out\build
          qmake DualRecordService.pro
          if %errorlevel% neq 0 (
            echo [ERROR] qmake failed
            exit /b 1
          )
          mingw32-make release -j4
          if %errorlevel% neq 0 (
            echo [ERROR] make failed
            exit /b 1
          )
          dir out\windows\

      # ── 6. 用 windeployqt 收集 Qt 运行库 ────────────────────
      - name: Deploy Qt dependencies (windeployqt)
        shell: cmd
        run: |
          windeployqt --release --force --no-translations out\windows\DualRecordService.exe
          echo --- out\windows directory ---
          dir out\windows\

      # ── 7. 准备 NSIS 安装包输入文件 ─────────────────────────
      #   install_windows.nsi 从 installer\bin\ 读取所有 dll
      #   以及 installer\docs\LICENSE.txt
      - name: Prepare NSIS input files
        shell: pwsh
        run: |
          # 创建 installer\bin\ 并将 out\windows\ 的内容复制进去
          New-Item -ItemType Directory -Force -Path "installer\bin"
          Copy-Item -Path "out\windows\*" -Destination "installer\bin\" -Recurse -Force

          # 若不存在 LICENSE.txt 则创建占位文件（NSIS 脚本要求）
          New-Item -ItemType Directory -Force -Path "installer\docs"
          if (-not (Test-Path "installer\docs\LICENSE.txt")) {
            $license = @"
          银行柜面双录控件
          版本 ${{ env.APP_VERSION }}
          Copyright (C) SiroInfo. All rights reserved.

          本软件专为银行柜面双录业务场景设计，仅限授权用户使用。
          "@
            Set-Content -Path "installer\docs\LICENSE.txt" -Value $license -Encoding UTF8
          }

          Write-Host "=== installer\bin contents ==="
          Get-ChildItem "installer\bin\" -Recurse | Select-Object FullName, Length

      # ── 8. 安装 NSIS ─────────────────────────────────────────
      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis --version 3.09 -y --no-progress
          # 确认安装路径
          $nsisExe = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (Test-Path $nsisExe) {
            Write-Host "NSIS installed at: $nsisExe"
            & $nsisExe /VERSION
          } else {
            Write-Error "NSIS not found!"
            exit 1
          }

      # ── 9. 编译 NSIS 安装包 ──────────────────────────────────
      - name: Build NSIS installer
        shell: cmd
        run: |
          if not exist release mkdir release
          cd installer
          "C:\Program Files (x86)\NSIS\makensis.exe" install_windows.nsi
          if %errorlevel% neq 0 (
            echo [ERROR] NSIS build failed
            exit /b 1
          )
          echo --- release output ---
          cd ..\release
          dir /b *.exe

      # ── 10. 验证安装包 ───────────────────────────────────────
      - name: Verify installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem "release\BankDualRecord_Setup_*.exe" | Select-Object -First 1
          if ($null -eq $installer) {
            Write-Error "Installer not found!"
            exit 1
          }
          Write-Host "Installer: $($installer.FullName)"
          Write-Host "Size: $([math]::Round($installer.Length / 1MB, 2)) MB"
          # 将路径写入环境变量供后续步骤使用
          echo "INSTALLER_PATH=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "INSTALLER_NAME=$($installer.Name)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # ── 11. 上传构建产物（每次 push 均保留 30 天）───────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: dualrecord-windows-installer-${{ github.sha }}
          path: ${{ env.INSTALLER_PATH }}
          retention-days: 30

      # ── 12. 发布 Release（仅推送 tag 时触发）────────────────
      - name: Create GitHub Release (Windows installer)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.INSTALLER_PATH }}
          name: "银行柜面双录控件 ${{ github.ref_name }}"
          body: |
            ## 银行柜面双录控件 ${{ github.ref_name }} — Windows 版本

            ### 适用系统
            - Windows 7 SP1 / Windows 10 / Windows 11（32-bit 安装包，兼容 64-bit 系统）

            ### 安装
            1. 双击运行 `BankDualRecord_Setup_v${{ env.APP_VERSION }}_x86.exe`
            2. 按安装向导完成安装（需管理员权限）
            3. 安装完成后程序将自动启动，并设置开机自启

            ### 卸载
            - 控制面板 → 程序和功能 → 银行双录控件 → 卸载
          draft: false
          prerelease: false
